icons_format = "{icon}"

[theme]
theme = "semi-native"
[theme.overrides]
separator = ""

[icons]
icons = "awesome6"

[[block]]
block = "net"
format = " $icon  "
interval = 5

[[block]]
block = "net"
device = "^wg-mv.*"
format = "$icon "
missing_format = ""

[[block]]
block = "sound"
format = " {$active_port|}{ $volume|} "
[[block.click]]
button = "left"
cmd = "pavucontrol"
[block.active_port_mappings]
"analog-output-headphones" = "\uf025"
"analog-output-speaker" = "\uf027"

[[block]]
block = "battery"
format = " $icon  $percentage "
driver= "upower"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "
